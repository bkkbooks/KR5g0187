front:
  text: 上清金真玉光八景飛經既四
  hash: sha256:abceac5e29c93bad9dd2679862f52fc342ba7f8da8d68dc27376fbf9e82b4bb3
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0187_HFL_000-001a, image: hfl/1042/1042-130.png}
body:
  text: 金真玉光太上隱書上相青童君撰九天丈人受太空靈都金真玉光於元始天王名之八景飛經廣生太真名之八素上經青真小童名之豁落七元太上大道君名曰隱書玉訣金章同出於九玄之先目其上篇而四時名焉其道髙妙衆經之尊總統萬真匡御羣仙玄符流映洞明紫晨祕於九天之上大有之宫金輝紫殿玉寶瓊房鑄金為簡以撰靈文刻玉丹書以明其篇流光奕奕輝煥大空日月俠照五晨翼靈命金華之女玉晨之童各三千人侍衛玉文玉妃典香靈風揚煙巨龍毒獸僃守玉闕瓊鳳撫翼神鸞蔭玄衆真宴禮萬聖朝軒玉陛騁蓋於霄庭太帝屈節於几前玉皇改度以推運璇璣命斗以回神唱神州以齊景變七轉以儛天歷三五於神化散軌度於九玄策五行以招魂御豁落以威靈命八景以登空攝天魔於金真披隱書於寂室詠妙章於無間理萬帝於上上總羣下於生生是時建氣之始九天丈人坐命靈都攜契玉仙五老上真三十九帝上皇先生萬始道君髙聖太神太上大道君扶桑大帝暘谷神王南極上元紫素三元君西龜王母太素三元君上登上上上紫瓊宫玉寶臺七映朱房施檄五帝四方司官靈都神兵輔衛上元命上仙太和王女施金真招靈攝魔之符置於五方太極四真人誦太空之章妙唱朗徹八景齊真玉光煥霄豁落洞明三晨停暉八風回旌玄鼓雲蓋九氣映靈三五翼讃六六合并蓊藹玄玄之上煥赫鬱乎太冥飛香繞日流電激精華光交灑神燭合明流緬千劫得妙忘旋於是九天丈人即臨玄臺之上命左仙侍郎李羽非監靈使者鄧元生執九色之麾瓊文帝章告盟四明啓付衆真太上大道君八景飛經金真玉光豁落七元位登至上洞遊玉清金仙輔翼五帝衛靈啓命事悉雲輪騁蓋飛虬整駕龍超霄際倐頃之間億仙立會瓊輪碧輦流精蓊藹衆吹雲歌鳯鳴鸞邁交煙互集徘徊玄太蕭蕭非太霞之上放浪於無涯之外各返玉虛之館豁若靈風之運氣太上大道君還登崚層之臺九曲之房引後聖九玄金闕帝君上相青君對齋三月依盟啓受於二君使各封一通於金闕上宫方諸青宫至大劫之周三道𧇊盈二氣離合理物有期承唐之世陽九放災翦除凶勃搜採上賢至此之年若有修行大洞之真經精雌一之幽關施八道以招無研金華於三元誦素靈於寂室䇿五行以招魂佩金神之虎文移七星於天關掌玄名於帝圖建青録於上清胞玉秀以結絡含瓊胎以內靈絶世好以長峊獨守默於自然可得玄授於八景告妙訣於金真施招靈於曲宇置豁落以御神拔七祖於幽宫免五苦於刀山離八難於火鄉滅負石於宿根有得此文超騰九玄縱迹飛影洞覩三清自無其人纍劫勿傳金真玉光八景飛經乃生九天之上元景之先玄光流映若無若存懸精暗藹洞曜瓊宫積七千餘劫其文甚明仰著空玄之上太虛之中覽亦不測毀亦不亡煥赫洞耀徹照十天於是九天丈人以建始元年歲在東維天甲吉辰清齋太空七寶瓊臺以金青盟天請受靈篇招靈攝魔豁落七元玄章既測亦無師宗不知從何忽然而生案文施行八景見形光燭瓊室招致萬真於時啓命帝皇羣仙莫不詣庭施俯仰之禮朝宴玉經也此乃九天之帝信玉皇之威章左輔執節仙都右置侍仙玉郎五方靈官十億萬人典衛寶文營輔佩者之身依太極四明萬劫一傳祕於九天之上大有之宫金暉紫殿玉寶瓊房施飛羅自然之帳玉几金牀玉晨之童執香侍左金華之女散煙於右太妃侍前玉仙輔後玄雲紫蓋廕乎堂宇諸真仙上聖一月三登行禮如是寶訣法告三五攺運大劫交周七百年中當行世間若有玄名帝簡玉字紫清金藏玉骨合真之人聽得盟傳輕泄帝寶七祖父母及兆之身被考三官充刀山地獄三徒之中萬劫不原奉者詳愼元始天王啓之於空玄之上以傳九天丈人太真太上大道君青真小童五老上真三十九帝上皇先生萬始道君南極上元紫素三元君西龜王母太素三元君太真夫人上皇先生以傳紫清帝君萬始道君以傳黃石先生三天玉童太上大道君以傳東海小童紫微夫人後聖九玄金闕帝君帝君以付上相青童君太極四真人西城王君如是寶訣皆上真口口相傳上相帝君科校撰集施行祝説法度先後相次集為寶卷今封一通於王屋山石室之中若有勤尚髙志棄放世榮登陟靈山精修苦念名掌青宫當得此文帝君當遣真人玄授兆身兆得此文五帝衛房招靈攝魔制精御神修道誦經上應九天無復試敗之凶按法施用真人下降與兆共言不過七年乘空而行九年精感白日登晨上上之道不傳非真凡有得金真玉光八景飛經者身皆玄挺應會宿命當仙每以别室燒香朝夕禮拜心存神真玉光紫氣滿於齋堂之中躬禮崇奉如眼對神帝遣金華之女玉晨之童各二十四人侍衛兆身賞功罰過分别善惡也又有左右水火二官紏察漏泄違科犯禁罰以風刀之考愆連七祖生死之科明愼修行凡修學上道人山登齋誦詠靈章而無此文施安招靈攝魔之符豁落七元上法不得妄動於玉篇真不為降天魔犯身故此文為九天之信玉皇之章無信而行因致道真不得輕以短見誦詠求仙積勞無感反收禍殃三官執考滅兆之身兆欲修道當僃衆聖令部數充足上下相成俯仰之格施行合度齋誦萬遍得真人降房剋日成仙不必萬遍正在精研有佩招靈攝魔豁落七元之符皆太一定生司命改年主録校籍注上太玄普告四司五帝靈官五嶽九河神仙萬靈皆稽首奉迎營衛兆身此上帝真皇章信故得制神使靈也凡行此道不得至冒淹入穢履生死之汚犯此之禁真靈髙逝反正上宫施名不制反誤兆身子得其法慎此為先立春之日三素元君上詣天皇太帝遊宴之時元景行道受仙之日也兆修金真玉光八景飛經之法當以其日沐浴齋戒清朝入室燒香行禮施安招靈致真攝魔之符置於五方兆於中央東北向叩齒十二通仰思紫緑白三色之雲東北而回便心合微言三素元君乞回神駕下降我身右别我名賜我神仙畢還思東北清微上府始陽宫中元景司空司録道君姓葛諱太呪獻形長七寸八分身著玄黃之綬頭冠七色耀天玉冠足躡五色之履手執威神之䇿乘八景之輿飛龜玄雲之車驂駕青龍從太和仙童二十三人下治兆身泥丸宫中乃微祝曰元景大神玄道回精上節告始萬氣混生九微上化回降我形保固元吉監總帝靈招真制魔我道威明上致太和玉芝充盈通神徹視洞覩三淸得乘飛景俱升帝庭畢仰咽八氣此元景之道行之八年則三素之雲八輿飛輪迎兆之身上升帝晨所謂八道元景招靈祕言不傳非仙之人春分之日太微天帝君上詣髙上玉皇遊宴之時始景行道受仙之日也至其日如上法夜半東向叩齒九通仰思玄青黃三色之雲東北而回便心念微言太微天帝君乞回神駕下降我身上我帝簡賜我神仙畢還思東方青陽上府玄微宫中始景老子大道君姓羽諱幽宨形長九寸身著紫青之綬頭戴九色通天寶冠足躡九色之履手執命神之章從太陽仙童三十六人乘八景之輿青雲之車驂駕蒼龍下治兆身明堂宫中仍微祝曰始景上元招靈致真承氣命節法典帝先回精玄蓋上宴玉晨回靈下降鎮固我身保精鍊氣五華結鮮紫氣流映洞得御神驂乘飛景上宴瓊軒畢仰咽九氣此始景之道行之八年則玄雲飛輪來迎兆身上升太清八道始景祕言勿傳非仙之人立夏之日太極上真三元真人上詣紫微宫遊宴之時玄景行道受仙之日也至其日如上法清旦東南向叩齒九通仰思青紫黃三色之雲西北回便心念微言太極上真三元真人乞回神駕下降我房書我玉名使我神仙畢還思東南少陽上府太微宫中玄景工光無極道君姓王諱無英形長八寸八分身著丹錦之綬頭戴無極進賢玉冠足躡九色之履手執招靈之章乘玄景緑輿五色雲車驂駕鳳凰從靈飛仙童三十九人下治兆身洞房宫中仍微祝曰玄景上靈驂宴八氣造景九玄翺翔無外回真下降解我宿滯廕以飛雲覆以紫蓋得乘八景上升霄際畢仰咽八氣止此玄景之道行之八年則紫青黃三色之雲玄景緑輿來迎兆身上升太清玄景八道祕言勿傳非仙之人夏至之日扶桑公太帝君上詣太微宫遊宴之時也虛景行道受仙之日至其日如上法清旦南向叩齒八通仰思赤白青三色之雲東南而回便心念微言扶桑大帝君乞回神光下盼兆身記名東華得乘飛煙畢還南向思太陽上府紫微宫中虛景太尉元先道君姓玄諱伯史形長八寸八分身著絳錦丹綬頭戴平天曜精玉冠足躡九色之履手執制魔之章乘光明八道之輿赤雲之車驂駕鳯凰從丹臺上宫玉童三十六人下治兆身中元丹田宫中仍微祝曰虛景啓靈乘氣旋回迅駕八道光明吐威下降我房映我丹輝攝魔御神萬靈悉摧使我洞幽與景齊飛畢仰咽八氣止此虛景之道行之八年則致光明八道之輿來迎兆身上升太清虛景八道祕言勿傳非仙之人也立秋之日太素上真白帝君上詣玉天玄皇髙真也元景行道受仙之日至其日如上法清旦西南向叩齒十二通仰思白赤紫三色之雲正西而回便心念微言太素真人乞回神光下降兆身奏名玉天得為真人畢思西南少隂上府靈微陽宫之中元景太一淡天道君姓黃諱運珠形長七寸八分著玄黃素綬頭帶七寶進賢之冠足躡九色之履手執命神之䇿乘翛條玉輦五彩朱蓋紫雲之車驂駕六龍從黃素上宫仙童二十四人治兆身下丹田宫中仍微祝曰元景上真八道玄靈上治黃母下治兆形徘徊神輦流映紫清歷運御氣三氣煥明制神攝魔我道洞精長保上景飛仙長生畢仰咽七氣止此元景之道行之八年則致翛條玉輦來迎兆身上升太清元景八道祕言勿傳非仙之人秋分之日南極上真赤帝君上詣閬風臺詣九靈夫人遊宴之時也明景行道受仙之日至其日如上法清旦西向叩齒十二通仰思青黃赤三色之雲西南而回便心念微言南極上真上皇赤帝君乞回神光下盻兆房賜書玉簡上奏九靈得乘飛景升入無形畢思正西太隂上府精微兊宫中明景太和道君姓浩諱二儀形長六寸八分身著白文素靈之綬頭戴無極寶天之冠足躡九色之履手執度命保生玉章乘絳琳碧輦白雲之車驂駕白虎從素靈上宫玉童二十二人下治兆身華蓋宫中仍微祝曰明景道宗總統九天弘絡紫霄迅御八煙回停玉輦下降我身啓以光明授以金真豁落招靈身無稽延得乘飛景上晏霄晨畢仰咽七氣止此明景之道行之八年則致絳琳碧舉來迎兆身上升太清明景八道祕言勿傳非仙之人立冬之日上清真人帝君皇祖上詣髙上九天玉帝遊宴之時也洞景行道受仙之日也至其日如上法清旦西北向叩齒九通仰思緑青紫三色之雲西南回便心念微言上清真人帝君皇祖乞回神駕下降兆房賜書玉名上奏上清得乘飛景升入無形畢思西北隂暉上府清微中宫洞景司録大陽道君姓玄諱元輔形長五寸八分身著玄黃之綬頭戴九玄飛晨玉冠足躡五色之履手執攝殺之律乘玄景八光丹輦紫雲之車驂駕玄武從太玄仙童二十四人下治兆身倉命宫中仍微祝曰洞景帝尊玄靈隂神乘霞御龍驂駕飛煙上遊玉清下治太玄回降紫輦來入我身得乘八景位同真人畢仰咽五氣止此洞景之道行之八年則致玄景八光丹輦下迎兆身上升太清洞景八道祕言勿傳非仙之人冬至之日太霄玉妃太虛上真人上詣太皇宫太微天帝君遊宴之時清景行道受仙之日也至其日如上法清旦正北向叩齒十二通仰思朱碧黃三色之雲東北而回便心念微言太霄玉妃太虛真人乞回神駕下降我房賜書玉名奏上太霄得為真人遊宴上宫畢思北方隂精上府道微宫中諌議玄