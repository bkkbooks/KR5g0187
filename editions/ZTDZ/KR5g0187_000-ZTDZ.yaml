  text: 上清金眞玉光八景飛經旣四
  hash: sha256:b3b36406614d49b1e5958b5f3f94ba0d12092eeac9faefa1c9db1226f12e8f42
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0187_SJB_000-340054a, image: sjb/34/340054a.png}
body:
  text: 金眞玉光太上隱書上相青童君譔九天丈人受太空靈都金真玉光於元始天王名之八景飛經廣生太眞名之八素上經青眞小童名之豁落七元太上大道君名曰隱書玉訣金章同出於九玄之先目其上篇而四時名焉其道髙妙衆經之尊總統萬眞匡御羣仙玄符流暎洞明紫晨祕於九天之上大有之宫金輝紫殿玉寶瓊房鑄金爲簡以譔靈文刻玉丹書以明其篇流光奕奕輝煥大空日月俠照五晨翼靈命金華之女玉晨之童各三千人侍衛玉文玉妃典香靈風揚煙巨龍毒獸僃守玉闕瓊鳳撫翼神鸞䕃玄衆眞宴禮萬聖朝軒玉陛騁蓋於霄庭太帝屈節於几前玉皇改度以推運璇璣命斗以廻神唱神州以齊景變七轉以儛天歷三五於神化散軌度於九玄策五行以招魂御豁落以威靈命八景以登空攝天魔於金眞披隱書於寂室詠妙章於无間理萬帝於上上總羣下於生生是時建炁之始九天丈人坐命靈都𢹂契玉仙五老上眞三十九帝上皇先生萬始道君髙聖太神太上大道君扶桑大帝暘谷神王南極上元紫素三元君西龜王母太素三元君上登上上上紫瓊宫玉寳臺七暎朱房施檄五帝四方司官靈都神兵輔衛上元命上仙太和王女施金眞招靈攝魔之符置於五方太極四眞人誦太空之章妙唱朗徹八景齊眞玉光煥霄豁落洞明三晨停暉八風廻旌玄鼓雲蓋九炁暎靈三五翼讃六六合并蓊藹玄玄之上煥赫鬱乎太冥飛香繞日流電激精華光交灑神燭合明流緬千劫得妙忘旋於是九天丈人即臨玄臺之上命左仙侍郎李羽非監靈使者鄧元生執九色之麾瓊文帝章吿盟四明啓付衆眞太上大道君八景飛經金眞玉光豁落七元位豋至上洞遊玉清金仙輔翼五帝衛靈啓命事悉雲輪騁蓋飛虬整駕龍超霄際倐頃之間億仙立會瓊輪碧輦流精蓊藹衆吹雲歌鳯鳴鸞邁交煙互集徘徊玄太蕭蕭非太霞之上放浪於无涯之外各返玉虚之館豁若靈風之運炁太上大道君還豋𡺿層之臺九曲之房引後聖九玄金闕帝君上相青君對齋三月依盟啓受於二君使各封一通於金闕上宫方諸青宫至大劫之周三道𧇊盈二炁離合理物有期承唐之世陽九放灾翦除兇勃搜採上賢至此之年若有修行大洞之眞經精雌一之幽關施八道以招无研金華於三元誦素靈於寂室䇿五行以招魂佩金神之虎文移七星於天關掌玄名於帝圖建青録於上清胞玉秀以結絡含瓊胎以内靈絶世好以長峊獨守黙於自然可得玄授於八景告妙訣於金眞施招靈於曲宇置豁落以御神㧞七祖於幽宫免五苦於刀山離八難於火郷滅負石於宿根有得此文超騰九玄縦跡飛影洞覩三清自無其人累劫勿傳金眞玉光八景飛經乃生九天之上元景之先玄光流暎若无若存懸精晻藹洞曜瓊宫積七千餘劫其文甚明仰著空玄之上太虚之中覽亦不測毀亦不亡煥赫洞耀徹照十天於是九天丈人以建始元年歳在東維天甲吉辰清齋太空七寳瓊臺以金青盟天請受靈篇招靈攝魔豁落七元玄章旣測亦无師宗不知從何忽然而生案文施行八景見形光燭瓊室招𦤺萬眞於時啓命帝皇羣僊莫不詣庭施俯仰之禮朝宴玉經也此乃九天之帝信玉皇之威章左輔執節仙都右置侍仙玉郎五方靈官十億萬人典衛寳文營輔佩者之身依太極四明萬劫一傳秘於九天之上大有之宫金暉紫殿玉寳瓊房施飛羅自然之帳玉几金牀玉晨之童執香侍左金華之女散煙於右太妃侍前玉仙輔後玄雲紫蓋廕乎堂宇諸眞仙上聖一月三豋行禮如是寳訣法告三五攺運大劫交周七百年中當行世間若有玄名帝簡玉字紫清金藏玉骨合眞之人聽得盟傳輕泄帝寳七祖父母及兆之身被考三官充刀山地獄三徒之中萬劫不原奉者詳愼元始天王啓之於空玄之上以傳九天丈人太眞太上大道君青眞小童五老上眞三十九帝上皇先生萬始道君南極上元紫素三元君西龜王母太素三元君太眞夫人上皇先生以傳紫清帝君萬始道君以傳黄石先生三天玉童太上大道君以傳東海小童紫微夫人後聖九玄金闕帝君帝君以付上相青童君太極四眞人西城王君如是寶訣皆上眞口口相傳上相帝君科校譔集施行祝說法度先後相次集爲寳卷今封一通於王屋山石室之中若有勤尚髙志棄放世榮豋陟靈山精修苦念名掌青宫當得此文帝君當遣眞人玄授兆身兆得此文五帝衛房招靈攝魔制精御神修道誦經上應九天无復試敗之㐫按法施用眞人下降與兆共言不過七年乗空而行九年精感白日登晨上上之道不傳非眞凡有得金眞玉光八景飛經者身皆玄挺應㑹宿命當仙毎以别室燒香朝夕禮拜心存神眞玉光紫炁滿於齋堂之中躬禮崇奉如眼對神帝遣金華之女玉晨之童各二十四人侍衛兆身賞功罰過分别善惡也又有左右水火二官紏察漏泄違科犯禁罰以風刀之考愆連七祖生死之科明愼修行凡修學上道人山登齋誦詠靈章而无此文施安招靈攝魔之符豁落七元上法不得妄動於玉篇眞不爲降天魔犯身故此文爲九天之信玉皇之章无信而行因致道眞不得輕以短見誦詠求仙積勞无感反收禍殃三官執考滅兆之身兆欲修道當僃衆聖令部數充足上下相成俯仰之格施行合度齋誦萬遍得眞人降房剋日成仙不必萬遍正在精研有佩招靈攝魔豁落七元之符皆太一定生司命改年主錄校籍注上太玄普告四司五帝靈官五嶽九河神仙萬靈皆稽首奉迎營衞兆身此上帝眞皇章信故得制神使靈也凡行此道不得至冒淹入穢履生死之汚犯此之禁眞靈髙逝反正上宫施名不制反誤兆身子得其法慎此爲先立春之日三素元君上詣天皇太帝遊宴之時元景行道受仙之日也兆修金眞玉光八景飛經之法當以其日沐浴齋戒清朝入室燒香行禮施安招靈致眞攝魔之符置於五方兆於中央東北向叩齒十二通仰思紫緑白三色之雲東北而廻便心合微言三素元君乞廻神駕下降我身右别我名賜我神仙畢還思東北清微上府始陽宫中元景司空司錄道君姓葛諱太呪獻形長七寸八分身着玄黃之綬頭冠七色耀天玉冠足躡五色之履手執威神之䇿乗八景之輿飛龜玄雲之車驂駕青龍從太和仙童二十三人下治兆身泥丸宫中乃微祝曰元景大神玄道廻精上節告始萬炁混生九微上化廻降我形保固元吉監總帝靈招眞制魔我道威明上致太和玉芝充盈通神徹視洞覩三淸得乗飛景俱昇帝庭畢仰咽八炁此元景之道行之八年則三素之雲八輿飛輪迎兆之身上昇帝晨所謂八道元景招靈祕言不傳非仙之人春分之日太微天帝君上詣髙上玉皇遊宴之時始景行道受仙之日也至其日如上法夜半東向叩齒九通仰思玄青黄三色之雲東北而廻便心念微言太微天帝君乞迴神駕下降我身上我帝簡賜我神仙畢還思東方青陽上府玄微宫中始景老子大道君姓羽諱幽宨形長九寸身着紫青之綬頭戴九色通天寳冠足躡九色之履手執命神之章從太陽仙童三十六人乗八景之輿青雲之車驂駕蒼龍下治兆身明堂宫中仍微祝曰始景上元招靈致眞承炁命節法典帝先廻精玄蓋上宴玉晨廻靈下降鎭固我身保精鍊炁五華結鮮紫炁流暎洞得御神驂乗飛景上宴瓊軒畢仰咽九炁此始景之道行之八年則玄雲飛輪來迎兆身上昇太清八道始景祕言勿傳非仙之人立夏之日太極上眞三元眞人上詣紫微宫遊宴之時玄景行道受仙之日也至其日如上法清旦東南向叩齒九通仰思青紫黄三色之雲西北廻便心念微言太極上眞三元眞人乞廻神駕下降我房書我玉名使我神仙畢還思東南少陽上府太微宫中玄景工光无極道君姓王諱无英形長八寸八分身着丹錦之綬頭戴无極進賢玉冠足躡九色之履手執招靈之章乗玄景緑輿五色雲車驂駕鳳凰從靈飛仙童三十九人下治兆身洞房宫中仍微祝曰玄景上靈驂宴八炁造景九玄翺翔無外廻眞下降解我宿滯廕以飛雲覆以紫蓋得乗八景上昇霄際畢仰咽八炁止此玄景之道行之八年則紫青黃三色之雲玄景緑輿來迎兆身上昇太清玄景八道祕言勿傳非仙之人夏至之日扶桑公太帝君上詣太微宫遊宴之時也虚景行道受仙之日至其日如上法清旦南向叩齒八通仰思赤白青三色之雲東南而廻便心念微言扶桑大帝君乞廻神光下盼兆身記名東華得乗飛煙畢還南向思太陽上府紫微宫中虚景太尉元先道君姓玄諱伯史形長八寸八分身着絳錦丹綬頭戴平天曜精玉冠足躡九色之履手執制魔之章乗光明八道之輿赤雲之車驂駕鳯凰從丹臺上宫玉童三十六人下治兆身中元丹田宫中仍微祝曰虚景啓靈乗炁旋廻迅駕八道光明吐威下降我房暎我丹輝攝魔御神萬靈悉摧使我洞幽與景齊飛畢仰咽八炁止此虚景之道行之八年則致光明八道之輿來迎兆身上昇太清虚景八道秘言勿傳非仙之人也立秋之日太素上眞白帝君上詣玉天玄皇髙眞也元景行道受仙之日至其日如上法清旦西南向叩齒十二通仰思白赤紫三色之雲正西而廻便心念微言太素眞人乞廻神光下降兆身奏名玉天得爲眞人畢思西南少隂上府靈微陽宫之中元景太一淡天道君姓黄諱運珠形長七寸八分着玄黃素綬頭帶七寳進賢之冠足躡九色之履手執命神之䇿乗翛條玉輦五彩朱蓋紫雲之車驂駕六龍從黃素上宫仙童二十四人治兆身下丹田宫中仍微祝曰元景上眞八道玄靈上治黃母下治兆形徘徊神輦流暎紫清歴運御氣三炁煥明制神攝魔我道洞精長保上景飛仙長生畢仰咽七炁止此元景之道行之八年則致翛條玉輦來迎兆身上昇太清元景八道秘言勿傳非仙之人秋分之日南極上眞赤帝君上詣閬風臺詣九靈夫人遊宴之時也明景行道受仙之日至其日如上法清旦西向叩齒十二通仰思青黃赤三色之雲西南而廻便心念微言南極上眞上皇赤帝君乞廻神光下盻兆房賜書玉簡上奏九靈得乗飛景昇入无形畢思正西太隂上府精微兊宫中明景太和道君姓浩諱二儀形長六寸八分身着白文素靈之綬頭戴无極寶天之冠足躡九色之履手執度命保生玉章乗絳琳碧輦白雲之車驂駕白虎從素靈上宫玉童二十二人下治兆身華蓋宫中仍微祝曰明景道宗總統九天弘絡紫霄迅御八煙廻停玉輦下降我身啓以光明授以金眞豁落招靈身无稽延得乗飛景上晏霄晨畢仰咽七炁止此明景之道行之八年則致絳琳碧舉來迎兆身上昇太清明景八道秘言勿傳非仙之人立冬之日上清眞人帝君皇祖上詣髙上九天玉帝遊宴之時也洞景行道受仙之日也至其日如上法清旦西北向叩齒九通仰思緑青紫三色之雲西南廻便心念微言上清眞人帝君皇祖乞廻神駕下降兆房賜書玉名上奏上清得乗飛景昇入无形畢思西北隂暉上府清微中宫㓊景司錄大陽道君姓玄諱元輔形長五寸八分身着玄黃之綬頭戴九玄飛晨玉冠足躡五色之履手執攝殺之律乗玄景八光丹輦紫雲之車驂駕玄武從太玄仙童二十四人下治兆身倉命宫中仍微祝曰洞景帝尊玄靈隂神乗霞御龍驂駕飛煙上遊玉清下治太玄廻降紫輦來入我身得乗八景位同眞人畢仰咽五炁止此洞景之道行之八年則致玄景八光丹輦下迎兆身上昇太清洞景八道秘言勿傳非仙之人冬至之日太霄玉妃太虚上眞人上詣太皇宫太微天帝君遊宴之時清景行道受仙之日也至其日如上法清旦正北向叩齒十二通仰思朱碧黃三色之雲東北而廻便心念微言太霄玉妃太虚眞人乞廻神駕下降我房賜書玉名奏上太霄得爲眞人遊宴上宫畢思北方隂精上府道微宫中諌議玄和道君姓玉諱隂精形長五寸八分身着玄雲五色之綬頭戴玄晨寳冠足躡五色獅子之履手執招靈之策乗徘徊玉輦錦雲之炁珠玉之車驂駕玄鳳黒翮從太玄上宫仙童三十六人下治兆身玄谷宫中仍微祝曰清景素眞元始同靈受化九元含炁朱嬰徘徊玉輦逍遥紫清輪轉八節緯度天經削我死錄保命南生得乗飛景按轡緑軿畢仰咽五炁止此清景之道行之八年致徘徊玉輦下迎兆身上昇太淸清景八道祕言勿傳非仙之人行八景飛經八道祕訣上皇玉帝告命諸天十方衆聖五嶽靈仙悉來護兆身降致玄輿飛輦得與眞人同昇上清眞皇守兆之命太一防兆之身出入遊行无有凶橫之患若无仙名玉籍列圖紫宫幽冥亦不可以此經啓悟兆心兆得此經即東華注簿位同眞人唯寳唯必不可輕宣妄泄祕言死滅兆門夫修金眞玉光八景飛經案置招靈致眞攝魔之符皆當先北向香爐叩左齒三十六通詠金眞太空之章一遍然後行事也詠此一句上響九天中徹无間外朗洞元玉帝駭聽羣魔束身此章至妙故爲金眞其篇曰天魔乗空發萬精駭神庭託化謡歌章隨變入无名囂氣何紛紛穢道當塗生雲中合朱宫北帝踊神兵鼓翔自知道玄運來相征上景按飛轡飛駕檢雲營促校北帝錄收攝羣魔名豁落張天羅放威擲流鈴金眞輔空洞玉光煥八冥金玄守上宫神虎戮天精翦滅萬祅氣億億悉齊平上承九天信嘯命靡不傾招眞究三洞慧誦朗且清八道望玄霞七轉緯天經混合帝一眞㧞度七祖程削滅五苦根反魂更受榮金光耀寂室神燭自然生華香散玉宇煙氣徹玉京帝遣徘徊輦三元降緑軿迅駕騰九玄朝禮玉皇庭畢便修所行如此一遍天兵輔眞玉帝攝魔修行上徹招致眞靈學无此章仙道不成天魔所敗反誤兆身故撰爲篇審而奉行招靈致眞攝魔之符一名九天信青帝招靈致眞攝魔之符以墨書青木簡上令廣九寸長一尺二寸置室東面修行誦經入室百日與神人共言三年室生自然青霞之雲欲致眞人天仙當書如法著符北面精思百日眞人降形諸仙詣房授子神眞之道兆欲攝魔書符如法安著中央誦太空之章一遍則北帝操兵天魔䘮形萬精滅景内外肅清又墨書青繒九寸佩身八年帝降八轝之輪下迎兆身白日上昇九天之祕信兆當寳宻修行其道道无不降仙无不成泄露宣非眞道則逺也禍滅兆身赤帝招靈致眞攝魔之符以青書赤木簡上令廣九寸長一尺二寸置室南面修行誦經入室百日與神人共言三年室生自然赤霞之雲欲致眞人天仙當書如法著符東面精思百日眞人降形仙人詣房授子神眞之道兆欲攝魔書符如上法安著西方誦太空之章一遍則北帝操兵天魔䘮形萬精滅景内外肅清又青書絳繒九寸佩身八年帝降八景之輿下迎兆身上昇太清九天秘信兆當寳宻修行其道道无不降仙无不成泄語三人傳付非眞道則逺也禍滅兆身白帝招靈致眞攝魔之符以黄書白木簡上令廣九寸長一尺二寸置室西南修行誦經入室百日與神人共言三年室生自然白霞之雲欲致眞人天仙當書如上法著符中央精思百日眞人降形仙人詣房授子神眞之道兆欲攝魔當書符如法安著東面誦太空之道章一遍則北帝操兵天魔䘮形萬精滅景内外肅淸又黄書白繒九寸佩身八年帝降玄景緑輿下迎兆身上昇太清九天祕信兆當寳宻修行其道道无不降仙无不成泄語三人傳付非眞道則逺也禍滅兆身黒帝招靈致眞攝魔之符以白書黒木簡上令廣九寸長一尺二寸置室北面修行誦經入室百日與神人共言三年室生自然黒霞之雲欲致眞人天仙當書如上法著符西方精思百日眞人降形仙人詣房授子神眞之道兆欲攝魔書符如法安著南面誦太空之章一遍則北帝操兵天魔䘮形萬精滅景内外肅清又白書黒繒九寸佩身八年帝遣光明八道之輿下迎兆身上昇太清九天秘信兆當寳宻修行其道道无不降仙无不成泄語三人傳付非眞道則逺也禍滅兆身黄帝招靈致眞攝魔之符以朱書黃木簡上令廣九寸長一尺二寸置室中央修行誦經入室百日與神人共言三年室生自然黄霞之雲欲致眞人天仙當書如上法著符南面精思百日眞人降形仙人詣房授子神眞之道兆欲攝魔當書如法以著北面誦太空之章一遍則北帝操兵天魔䘮形萬精滅景内外肅清又朱書黃繒九寸佩身八年帝遣徘徊之輦下迎兆身上昇太清宫九天祕信兆當宻寳修行其道道无不降仙无不成泄語三人傳付非眞道則逺也禍滅兆身書符都畢北向叩齒三十六通微祝曰九天有命普告萬靈三代相推五炁交并玉帝顯駕控轡霄庭施布正法收魔束精剪戮㐫祅萬道齊平道流後學帝君記名招眞洞幽炁交无形變景鍊骨道昇三清得迅飛輿上造玉庭畢隨位置符眞仙立降身无禍殃學无此道鮮不䘮身可謂妙法不學自仙也帝君豁落七元上符一名帝皇威章右一元豁落日精之符兆欲修行誦經求仙當以雌黃書生碧上佩身兆欲上致眞人朱書白紙東向服之精思百日眞人降房與兆共言兆欲制魔當以靑書黃木九寸板上著月建上天魔自消萬精束形帝皇之章愼勿洩揚秘而奉修七年飛仙右二元豁落月精之符兆欲修行誦經求仙當以空青書絳繒佩身兆欲通靈致神黄書白紙西向服之精思百日神人降形與兆共言兆欲制魔攝精當以黒書赤木九寸板上施著東北之上百日北帝捕魔天元攝精萬祅絶滅内外蕩清帝皇之章祕而修行七年飛仙白日昇天右三元豁落歲星精符兆欲行道求仙當以朱書生碧佩身兆欲致東嶽眞人仙官當以黒書青紙東向服之精思百日仙官立到眞人詣房賜兆神仙之藥也兆欲制青帝之魔當以白書青木九寸板上著東面百日天魔束形萬精自䘮帝皇之章秘而修行七年飛仙白日昇天右四元豁落太白星精符兆欲行道求仙當以雌黃書白素佩身兆欲致西嶽眞人仙官當以黄書白紙西向服之精思百日仙官立到眞人詣房賜兆眞書與兆共言兆欲制白帝之魔當以朱書白木九寸板上向西面百日天魔束形萬精自䘮帝皇之章行之七年神仙度世白日昇天右五元豁落熒惑星精符兆欲行道求仙當以雌黄書生紫佩身兆欲致南嶽眞人仙官當以青書赤紙南向服之精思百日仙官立到眞人詣房賜兆神芝寳文與兆共言兆欲制赤帝之魔當以黒書赤木九寸板上向南面百日天魔束形萬精自䘮帝皇之章行之七年神仙度世白日昇天右六元豁落辰星精符兆欲行道求仙當以黒書黄素佩身兆欲致北嶽眞人仙官當以白書黒紙向北服之精思百日仙官立致眞人詣房賜兆神仙之藥與兆共言兆欲制黒帝之魔當以黄書黒木九寸板上向北面百日天魔束形萬精自䘮帝皇之章行之七年神仙飛行白日昇天右七元豁落鎭星精符兆欲行道求仙當以朱書青碧佩身兆欲致中嶽眞人仙官當以朱書黄紙向太𡻕上服之精思百日仙官立到眞人詣房授兆神仙之藥五老眞書兆欲制黄帝之魔當以青書黄木九寸板上置於太𡻕之上百日天魔束形萬精自䘮帝皇之章行之七年神仙飛行白日昇天右髙上玉帝元皇道君受九天丈人豁落七元之符主致上眞飛仙之官通靈徹視與神交言制魔伏靈威攝十方流火萬里坐在立亡行之九年得乗玄輿飛行上清施行上道修行求仙攝魔御精書符如法北向叩左齒三十六通存日月五星精光洞暎兆身微祝曰七元煥落流威吐精擲光萬里神耀五靈上攝北酆檢録鬼名天帝命章剪戮賈生我僃豁落流金火鈴内保六府外引流精飛仙眞人與我齊并洞覩空洞三道合明得御玄雲驂駕緑軿𢹂率五嶽運我昇清畢隨位施用七年尅有眞人来降授兆上眞寳文也夫有金骨玉名紫字上清得佩招靈致眞攝魔之符豁落七元之符則九天記名帝告萬眞四司靈官右别兆身出入行来登陟五嶽仙官衛迎萬魔伏首羣凶䘮精修行百日與神通靈眞人下降授兆眞經也七年之中得乗飛軿遊戯五嶽出入三清泄語三人傳不得眞七祖父母下及兆身並充刀山三徒之中萬劫不原得者保祕愼負四明凡上學之士道成飛昇而无此文亦九天玉司不遺兆仙天關之門亦不可得前五嶽之官亦不衛兆之身故九天之信帝皇之章施於巳成眞人不行於世得者便仙其有左輔執節仙都右置侍仙玉郎五方靈官典衛此文不可輕慢泄露上眞有犯其禁死滅兆身上古之科萬劫一傳今有其人七百年中聽得三傳依明科之法師弟子對齋九十日齎金龍玉魚各一枚紫紋百尺上金三兩以奉有經之師誓於九天之信无盟而傳身被風刀之考受而无信輕道賤眞身没鬼官愆連七玄故四極明科有三分之信師受不依科文以營他用死没三官長充地獄萬不得仙趙伯玄昔師萬始先生受書道成當登金闕而无招靈致眞豁落七元二符於俯仰之格方退還戎山七百年後詣清眞小童依盟受之誓於委羽之山今昇爲上清左司君王君以經於陽洛山十一月上午子時盟九天以傳南嶽夫人今封於陽洛山中南嶽松子以陽朔之年於太華山傳經於谷希子令封一通於鳥䑕山中桐栢眞人以六月二十九日以此文授許逺遊上清金眞玉光八景飛經
